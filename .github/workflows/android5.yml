name: Manus AI Auto Patch and Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 解壓縮 Manus AI 給您的 ZIP 檔
    - name: Unzip Project
      run: |
        unzip -q *.zip
        rm *.zip

    # 2. 設定 Java 環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 💡 核心關鍵：如果找不到 gradlew，就利用雲端工具強制自動生成它！
    - name: Auto Generate Gradle Wrapper if missing
      run: |
        if [ ! -f "gradlew" ]; then
          echo "偵測到 Manus AI 專案缺少編譯環境，正在自動生成 Gradle 包裝器..."
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
        else
          chmod +x gradlew
        fi

    # 4. 執行編譯指令
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # 5. 上傳產出的 APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: manus-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
