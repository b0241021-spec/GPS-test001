name: Manus Build APK Final

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. 解壓縮 Manus AI 的 ZIP 檔案
    - name: Unzip Project
      run: |
        unzip -q *.zip || true
        rm -f *.zip

    # 2. 設定 Java 17 編譯環境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. 如果專案缺件，在雲端自動補齊 Gradle 基礎檔案
    - name: Auto Patch Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "找不到編譯環境，正在自動補齊..."
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew

    # 4. 開始線上編譯
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    # 5. 上傳並釋出 APK 供下載
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: final-manus-apk
        path: "**/build/outputs/apk/debug/*.apk"
